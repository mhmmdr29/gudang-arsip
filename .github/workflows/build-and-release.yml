name: Build and Release ZIP

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Create ZIP file
        run: |
          # Exclude patterns
          EXCLUDE_PATTERNS=(
            "node_modules"
            ".next"
            ".git"
            ".env"
            "dev.log"
            "server.log"
            ".DS_Store"
          )

          # Create temporary directory
          mkdir -p temp_zip

          # Copy all files to temp directory
          find . -maxdepth 1 -not -name ".git" -not -name "temp_zip" -not -name ".next" -not -name "node_modules" -exec cp -r {} temp_zip/ \;

          # Remove excluded directories from temp
          for pattern in "${EXCLUDE_PATTERNS[@]}"; do
            rm -rf "temp_zip/$pattern"
          done

          # Remove hidden files
          find temp_zip -name ".*" -type f -delete
          find temp_zip -name ".*" -type d -exec rm -rf {} +

          # Create ZIP
          cd temp_zip
          zip -r ../gudang-arsip.zip .
          cd ..

          # Get file size
          SIZE=$(du -h gudang-arsip.zip | cut -f1)
          echo "ZIP file created: gudang-arsip.zip ($SIZE)"

      - name: Upload ZIP as artifact
        uses: actions/upload-artifact@v4
        with:
          name: gudang-arsip-zip
          path: gudang-arsip.zip
          retention-days: 90

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: gudang-arsip.zip
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
